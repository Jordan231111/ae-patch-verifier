<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify AE ModMenu</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f2;
      --panel: #ffffff;
      --ink: #191b1f;
      --muted: #626772;
      --line: #d8d9d4;
      --ok: #137a3f;
      --fail: #b42318;
      --warn: #a15c00;
      --info: #2454a6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    #dropZone {
      display: grid;
      place-items: center;
      min-height: 180px;
      margin: 22px 0;
      border: 2px dashed #9aa0aa;
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
      transition: border-color 120ms ease, background 120ms ease;
    }

    #dropZone.dragover {
      border-color: var(--info);
      background: #eef4ff;
    }

    #dropZone strong {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: #9aa0aa;
    }

    input[type="file"] {
      display: none;
    }

    #status {
      min-height: 22px;
      margin: 0 0 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      font-weight: 600;
    }

    .ok { color: var(--ok); }
    .fail { color: var(--fail); }
    .warn { color: var(--warn); }
    .info { color: var(--info); }

    section {
      margin: 18px 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    section h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      letter-spacing: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      background: #fafafa;
    }

    td.detail {
      white-space: normal;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      word-break: break-word;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .result {
      font-weight: 700;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Verify AE ModMenu</h1>
    <p>Drop an APK or XAPK. The verifier extracts <code>lib/arm64-v8a/libapp.so</code> and checks patch anchors for unique ON and OFF/UNDO targets. Speedy is skipped because the script intentionally uses raw float search.</p>

    <label id="dropZone" for="fileInput">
      <span>
        <strong>Drop APK/XAPK here</strong>
        <button type="button" id="chooseButton">Choose file</button>
      </span>
    </label>
    <input id="fileInput" type="file" accept=".apk,.xapk,application/zip">

    <div id="status">Waiting for file.</div>
    <div id="summary" class="summary hidden"></div>
    <div id="results"></div>
  </main>

  <script src="./jszip.min.js"></script>

        ],

        searchBytes: "E6000094F303002AC0000036A81240F9E10314AA00410091893DC497",
        patchedPattern: "E6000094F303002AC0000036A81240F9E10314AA00410091893DC497",

    const TEAM_GOD = {
      branchOriginal: "680240F9",
      branchAfter: "F80300AAE00313AA083140F900013FD6000040F9E10317CB",
      cavePrefix: "66C866C866C866C866C866C866C866C804220422042204220422042204220422EBBAEBBAEBBAEBBAEBBAEBBAEBBAEBBA",
      caveSuffix: "FF8306D1E80303AAAC508952FD7BBAA9FD030091",
      hpTargetPrefix: "FD7BBCA9F70B00F9F65702A9F44F03A9FD030091F50301AAF30300AA25000094",
      caveTemplate: "F80300AA680240F9E00313AA08CD40F900013FD61F04007100010054680240F9E00313AA083140F900013FD6000040F9E10317CB"
    };

    const ITEM = {
      prefix: "F603002AA0420091",
      afterOffsetFromPrefix: 20,
      after: "E00314AAE303132A",
      patchOffset: 16,
      originalBytes: "0200160B"
    };

    const AD_BYPASS = {
      sdkShowPatchName: "Ad Bypass: SDK showRewardedVideo call suppressed",
      statePatchName: "Ad Bypass: post-show state-store -> lifecycle trampoline",
      cavePatchName: "Ad Bypass: lifecycle code cave",
      stateSearchPattern: "2800805268C60F3902000014E8031F2A",
      stateSearchBytes: "2800805268C60F3902000014E8031F2A",
      statePatchOffset: 0x10,
      stateOriginalBytes: "68C20F39",
      caveSize: 80,
      cavePrefix: "66C866C866C866C866C866C866C866C804220422042204220422042204220422EBBAEBBAEBBAEBBAEBBAEBBAEBBAEBBA",
      caveSuffix: "FD7BA3A9693B00D0FD030091",
      sdkShowWrapperPrologue: "FF8301D1FD7B04A9",
      openedBridgePrologue: "FD7BBFA9FD03009180C3FEB000081591",
      rewardBridgePrologue: "FD7BBEA9F30B00F9FD03009120C7FE9000881E91",
      closedBridgePrologue: "FD7BBFA9FD03009100C9FE9000D01991",
      availabilityBridgePrologue: "FD7BBEA9F30B00F9FD03009160CBFEB0008C3891",
      frameSetup: "FD7BBFA9FD030091",
      nullPlacementArg: "E2031FAA",
      availableTrueArg: "22008052",
      caveRestoreFrame: "FD7BC1A8",
      nop: "1F2003D5"
    };

    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const summaryEl = document.getElementById("summary");
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const chooseButton = document.getElementById("chooseButton");

    chooseButton.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    for (const eventName of ["dragenter", "dragover"]) {
      dropZone.addEventListener(eventName, event => {
        event.preventDefault();
        dropZone.classList.add("dragover");
      });
    }

    for (const eventName of ["dragleave", "drop"]) {
      dropZone.addEventListener(eventName, event => {
        event.preventDefault();
        dropZone.classList.remove("dragover");
      });
    }

    dropZone.addEventListener("drop", event => {
      const file = event.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    function setStatus(text, className = "") {
      statusEl.textContent = text;
      statusEl.className = className;
    }

    function hexToBytes(hex) {
      const clean = hex.replace(/\s+/g, "");
      const bytes = new Uint8Array(clean.length / 2);
      for (let i = 0; i < clean.length; i += 2) {
        bytes[i / 2] = parseInt(clean.slice(i, i + 2), 16);
      }
      return bytes;
    }

    function bytesEqual(data, offset, bytes) {
      if (offset < 0 || offset + bytes.length > data.length) return false;
      for (let i = 0; i < bytes.length; i++) {
        if (data[offset + i] !== bytes[i]) return false;
      }
      return true;
    }

    function findAll(data, pattern, ranges) {
      const hits = [];
      for (const range of ranges) {
        let offset = range.start;
        while (offset < range.end) {
          offset = data.indexOf(pattern[0], offset);
          if (offset === -1 || offset >= range.end) break;
          if (offset + pattern.length <= range.end && bytesEqual(data, offset, pattern)) {
            hits.push(offset);
          }
          offset++;
        }
      }
      return hits;
    }

    function writeBytes(data, offset, bytes) {
      data.set(bytes, offset);
    }

    function readU16(data, offset) {
      return data[offset] | (data[offset + 1] << 8);
    }

    function readU32(data, offset) {
      return (data[offset] | (data[offset + 1] << 8) | (data[offset + 2] << 16) | (data[offset + 3] << 24)) >>> 0;
    }

    function readU64Number(data, offset) {
      const lo = readU32(data, offset);
      const hi = readU32(data, offset + 4);
      return hi * 0x100000000 + lo;
    }

    function dwordToBytes(value) {
      return new Uint8Array([
        value & 0xFF,
        (value >>> 8) & 0xFF,
        (value >>> 16) & 0xFF,
        (value >>> 24) & 0xFF
      ]);
    }

    function branchTarget(data, offset, linkExpected) {
      const instruction = readU32(data, offset);
      const opcode = (instruction & 0xFC000000) >>> 0;
      const expected = linkExpected ? 0x94000000 : 0x14000000;
      if (opcode !== expected) return null;

      let imm26 = instruction & 0x03FFFFFF;
      if (imm26 >= 0x02000000) imm26 -= 0x04000000;
      return offset + (imm26 * 4);
    }

    function cbzTarget(data, offset, rtExpected) {
      const instruction = readU32(data, offset);
      if ((instruction & 0x7F000000) !== 0x34000000) return null;
      if ((instruction & 0x1F) !== rtExpected) return null;

      let imm19 = (instruction >>> 5) & 0x7FFFF;
      if (imm19 >= 0x40000) imm19 -= 0x80000;
      return offset + (imm19 * 4);
    }

    function encodeCbzW(register, source, target) {
      const delta = target - source;
      if (delta % 4 !== 0) throw new Error("unaligned CBZ target");
      let imm19 = delta / 4;
      if (imm19 < -0x40000 || imm19 > 0x3FFFF) throw new Error("CBZ target out of range");
      if (imm19 < 0) imm19 += 0x80000;
      return (0x34000000 | ((imm19 & 0x7FFFF) << 5) | (register & 0x1F)) >>> 0;
    }

    function encodeBranch(opcode, source, target) {
      const delta = target - source;
      if (delta % 4 !== 0) throw new Error("unaligned branch target");
      let imm26 = delta / 4;
      if (imm26 < -0x2000000 || imm26 > 0x1FFFFFF) throw new Error("branch target out of range");
      if (imm26 < 0) imm26 += 0x4000000;
      return (opcode | (imm26 & 0x03FFFFFF)) >>> 0;
    }

    function concatBytes(...chunks) {
      const size = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const out = new Uint8Array(size);
      let offset = 0;
      for (const chunk of chunks) {
        out.set(chunk, offset);
        offset += chunk.length;
      }
      return out;
    }

    function toHex(value) {
      if (value === null || value === undefined) return "";
      return "0x" + value.toString(16).toUpperCase();
    }

    function parseExecutableRanges(data) {
      if (data[0] !== 0x7F || data[1] !== 0x45 || data[2] !== 0x4C || data[3] !== 0x46) {
        return [{ start: 0, end: data.length, delta: 0 }];
      }
      if (data[4] !== 2 || data[5] !== 1) {
        return [{ start: 0, end: data.length, delta: 0 }];
      }

      const phoff = readU64Number(data, 32);
      const phentsize = readU16(data, 54);
      const phnum = readU16(data, 56);
      const ranges = [];
      for (let i = 0; i < phnum; i++) {
        const off = phoff + (i * phentsize);
        const type = readU32(data, off);
        const flags = readU32(data, off + 4);
        if (type !== 1 || (flags & 1) === 0) continue;

        const fileOffset = readU64Number(data, off + 8);
        const vaddr = readU64Number(data, off + 16);
        const fileSize = readU64Number(data, off + 32);
        ranges.push({
          start: fileOffset,
          end: Math.min(fileOffset + fileSize, data.length),
          delta: vaddr - fileOffset
        });
      }

      return ranges.length ? ranges : [{ start: 0, end: data.length, delta: 0 }];
    }

    function rvaForOffset(offset, ranges) {
      const range = ranges.find(item => offset >= item.start && offset < item.end);
      return range ? offset + range.delta : offset;
    }

    function resultStatus(count) {
      if (count === 1) return ["PASS", "ok"];
      if (count === 0) return ["NOT FOUND", "fail"];
      return ["MULTIPLE", "fail"];
    }

    function uniquePatchAnchors(data, ranges, def, kind) {
      const pattern = hexToBytes(kind === "on" ? def.searchPattern : def.patchedPattern);
      const bytes = hexToBytes(kind === "on" ? def.searchBytes : def.patchedBytes);
      const checks = (kind === "on" ? def.searchChecks : def.patchedChecks) || [];
      const stateBytes = hexToBytes(kind === "on" ? def.originalBytes : def.patchBytes);
      const seen = new Set();
      const hits = [];

      for (const hit of findAll(data, pattern, ranges)) {
        if (!bytesEqual(data, hit, bytes)) continue;

        let ok = true;
        for (const check of checks) {
          if (!bytesEqual(data, hit + check.offset, hexToBytes(check.bytes))) {
            ok = false;
            break;
          }
        }
        if (!ok) continue;

        const patchAddress = hit + def.patchOffset;
        if (!bytesEqual(data, patchAddress, stateBytes)) continue;

        if (!seen.has(patchAddress)) {
          seen.add(patchAddress);
          hits.push(patchAddress);
        }
      }

      return hits;
    }

    function verifyItem(data, ranges) {
      const prefix = hexToBytes(ITEM.prefix);
      const after = hexToBytes(ITEM.after);
      const originalBytes = hexToBytes(ITEM.originalBytes);
      const hits = [];
      const seen = new Set();
      for (const hit of findAll(data, prefix, ranges)) {
        if (!bytesEqual(data, hit + ITEM.afterOffsetFromPrefix, after)) continue;
        const patchAddress = hit + ITEM.patchOffset;
        if (!bytesEqual(data, patchAddress, originalBytes)) continue;
        if (!seen.has(patchAddress)) {
          seen.add(patchAddress);
          hits.push(patchAddress);
        }
      }
      return makeRow("Item Multiplier", "ON anchor + original write bytes", hits, ranges);
    }

    function makeRow(feature, check, hits, ranges, detail = "") {
      const [status, klass] = resultStatus(hits.length);
      const addresses = hits.map(hit => toHex(rvaForOffset(hit, ranges))).join(", ");
      return { feature, check, status, klass, count: hits.length, detail: detail || addresses };
    }

    function verifyPatch(data, ranges, def) {
      const rows = [];
      const onHits = uniquePatchAnchors(data, ranges, def, "on");
      rows.push(makeRow(def.name, "ON anchor + original write bytes", onHits, ranges));

      const simulated = data.slice();
      if (onHits.length === 1) {
        writeBytes(simulated, onHits[0], hexToBytes(def.patchBytes));
      }
      const offHits = uniquePatchAnchors(simulated, ranges, def, "off");
      rows.push(makeRow(def.name, "OFF/UNDO anchor + patched write bytes after ON simulation", offHits, ranges));
      return rows;
    }

    function uniqueAdStateAnchors(data, ranges, stateBytes) {
      const def = {
        searchPattern: AD_BYPASS.stateSearchPattern,
        searchBytes: AD_BYPASS.stateSearchBytes,
        patchOffset: AD_BYPASS.statePatchOffset
      };
      const pattern = hexToBytes(def.searchPattern);
      const bytes = hexToBytes(def.searchBytes);
      const expected = stateBytes instanceof Uint8Array ? stateBytes : hexToBytes(stateBytes);
      const seen = new Set();
      const hits = [];

      for (const hit of findAll(data, pattern, ranges)) {
        if (!bytesEqual(data, hit, bytes)) continue;
        const patchAddress = hit + def.patchOffset;
        if (!bytesEqual(data, patchAddress, expected)) continue;
        if (!seen.has(patchAddress)) {
          seen.add(patchAddress);
          hits.push(patchAddress);
        }
      }

      return hits;
    }

    function uniqueAdCaveAnchors(data, ranges, caveBytes) {
      const suffix = hexToBytes(AD_BYPASS.caveSuffix);
      const prefix = hexToBytes(AD_BYPASS.cavePrefix);
      const expected = caveBytes instanceof Uint8Array ? caveBytes : hexToBytes(caveBytes);
      const seen = new Set();
      const hits = [];

      for (const suffixHit of findAll(data, suffix, ranges)) {
        const caveAddress = suffixHit - AD_BYPASS.caveSize;
        if (!bytesEqual(data, caveAddress - prefix.length, prefix)) continue;
        if (!bytesEqual(data, caveAddress, expected)) continue;
        if (!seen.has(caveAddress)) {
          seen.add(caveAddress);
          hits.push(caveAddress);
        }
      }

      return hits;
    }

    function bridgeHits(data, ranges) {
      return {
        opened: findAll(data, hexToBytes(AD_BYPASS.openedBridgePrologue), ranges),
        rewarded: findAll(data, hexToBytes(AD_BYPASS.rewardBridgePrologue), ranges),
        closed: findAll(data, hexToBytes(AD_BYPASS.closedBridgePrologue), ranges),
        availability: findAll(data, hexToBytes(AD_BYPASS.availabilityBridgePrologue), ranges)
      };
    }

    function buildAdLifecyclePatch(caveAddress, stateAddress, bridges) {
      const stateBytes = hexToBytes(AD_BYPASS.stateOriginalBytes);
      const frameSetup = hexToBytes(AD_BYPASS.frameSetup);
      const nullPlacement = hexToBytes(AD_BYPASS.nullPlacementArg);
      const availableTrue = hexToBytes(AD_BYPASS.availableTrueArg);
      const restoreFrame = hexToBytes(AD_BYPASS.caveRestoreFrame);
      const bytes = [];
      const offsets = {};

      const add = (name, chunk) => {
        offsets[name] = bytes.length;
        for (const byte of chunk) bytes.push(byte);
      };

      add("stateWrite", stateBytes);
      offsets.cbz = bytes.length;
      bytes.push(0, 0, 0, 0);
      add("frameSetup", frameSetup);
      add("openedBranch", dwordToBytes(encodeBranch(0x94000000, caveAddress + bytes.length, bridges.opened)));
      add("nullPlacement", nullPlacement);
      add("rewardBranch", dwordToBytes(encodeBranch(0x94000000, caveAddress + bytes.length, bridges.rewarded)));
      add("closedBranch", dwordToBytes(encodeBranch(0x94000000, caveAddress + bytes.length, bridges.closed)));
      add("availableTrue", availableTrue);
      add("availabilityBranch", dwordToBytes(encodeBranch(0x94000000, caveAddress + bytes.length, bridges.availability)));
      add("restoreFrame", restoreFrame);
      offsets.returnBranch = bytes.length;
      const cbzBytes = dwordToBytes(encodeCbzW(8, caveAddress + offsets.cbz, caveAddress + offsets.returnBranch));
      for (let i = 0; i < cbzBytes.length; i++) bytes[offsets.cbz + i] = cbzBytes[i];
      add("returnBranch", dwordToBytes(encodeBranch(0x14000000, caveAddress + bytes.length, stateAddress + 4)));

      if (bytes.length > AD_BYPASS.caveSize) throw new Error("ad lifecycle cave exceeds reserved size");
      while (bytes.length < AD_BYPASS.caveSize) bytes.push(0);

      return { bytes: new Uint8Array(bytes), offsets };
    }

    function verifyAdBypassControlFlow(data, ranges) {
      const rows = [];
      const sdkShowDef = PATCHES.find(patch => patch.name === AD_BYPASS.sdkShowPatchName);
      if (!sdkShowDef) return rows;

      const sdkShowHits = uniquePatchAnchors(data, ranges, sdkShowDef, "on");
      const stateHits = uniqueAdStateAnchors(data, ranges, AD_BYPASS.stateOriginalBytes);
      const emptyCave = new Uint8Array(AD_BYPASS.caveSize);
      const caveHits = uniqueAdCaveAnchors(data, ranges, emptyCave);

      rows.push(makeRow(AD_BYPASS.statePatchName, "ON anchor + original write bytes", stateHits, ranges));
      rows.push(makeRow(AD_BYPASS.cavePatchName, "ON anchor + original write bytes", caveHits, ranges));

      const bridges = bridgeHits(data, ranges);
      const bridgesAreUnique = Object.values(bridges).every(hits => hits.length === 1);
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "rewarded-video bridge prologues are unique",
        status: bridgesAreUnique ? "PASS" : "FAIL",
        klass: bridgesAreUnique ? "ok" : "fail",
        count: bridgesAreUnique ? 1 : 0,
        detail: "opened=" + bridges.opened.length + ", rewarded=" + bridges.rewarded.length + ", closed=" + bridges.closed.length + ", availability=" + bridges.availability.length
      });

      if (sdkShowHits.length !== 1 || stateHits.length !== 1 || caveHits.length !== 1 || !bridgesAreUnique) {
        rows.push({
          feature: "Ad Bypass control-flow",
          check: "SDK show suppressor, post-show state trampoline, and lifecycle cave anchors",
          status: "FAIL",
          klass: "fail",
          count: 0,
          detail: "SDK show anchors=" + sdkShowHits.length + ", state anchors=" + stateHits.length + ", cave anchors=" + caveHits.length
        });
        return rows;
      }

      const sdkShowAddress = sdkShowHits[0];
      const stateAddress = stateHits[0];
      const caveAddress = caveHits[0];
      const bridgeTargets = {
        opened: bridges.opened[0],
        rewarded: bridges.rewarded[0],
        closed: bridges.closed[0],
        availability: bridges.availability[0]
      };
      const originalTarget = branchTarget(data, sdkShowAddress, true);
      const originalTargetOk = originalTarget !== null && bytesEqual(data, originalTarget, hexToBytes(AD_BYPASS.sdkShowWrapperPrologue));
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "original SDK showRewardedVideo call target",
        status: originalTargetOk ? "PASS" : "FAIL",
        klass: originalTargetOk ? "ok" : "fail",
        count: originalTargetOk ? 1 : 0,
        detail: originalTargetOk
          ? "target=" + toHex(rvaForOffset(originalTarget, ranges))
          : "original SDK show BL target is missing or does not match wrapper prologue"
      });

      const stateBranchPatch = dwordToBytes(encodeBranch(0x14000000, stateAddress, caveAddress));
      const cavePatch = buildAdLifecyclePatch(caveAddress, stateAddress, bridgeTargets);
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "generated state branch and lifecycle cave bytes",
        status: stateBranchPatch.length === 4 && cavePatch.bytes.length === AD_BYPASS.caveSize ? "PASS" : "FAIL",
        klass: stateBranchPatch.length === 4 && cavePatch.bytes.length === AD_BYPASS.caveSize ? "ok" : "fail",
        count: stateBranchPatch.length === 4 && cavePatch.bytes.length === AD_BYPASS.caveSize ? 1 : 0,
        detail: "state=" + toHex(rvaForOffset(stateAddress, ranges)) + ", cave=" + toHex(rvaForOffset(caveAddress, ranges))
      });

      const simulated = data.slice();
      writeBytes(simulated, caveAddress, cavePatch.bytes);
      writeBytes(simulated, stateAddress, stateBranchPatch);
      writeBytes(simulated, sdkShowAddress, hexToBytes(sdkShowDef.patchBytes));

      rows.push(makeRow(AD_BYPASS.statePatchName, "OFF/UNDO anchor + generated branch after ON simulation", uniqueAdStateAnchors(simulated, ranges, stateBranchPatch), ranges));
      rows.push(makeRow(AD_BYPASS.cavePatchName, "OFF/UNDO anchor + generated cave bytes after ON simulation", uniqueAdCaveAnchors(simulated, ranges, cavePatch.bytes), ranges));

      const sdkSuppressedOk = bytesEqual(simulated, sdkShowAddress, hexToBytes(AD_BYPASS.nop));
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "patched SDK showRewardedVideo call is suppressed",
        status: sdkSuppressedOk ? "PASS" : "FAIL",
        klass: sdkSuppressedOk ? "ok" : "fail",
        count: sdkSuppressedOk ? 1 : 0,
        detail: sdkSuppressedOk
          ? "NOP at " + toHex(rvaForOffset(sdkShowAddress, ranges))
          : "SDK showRewardedVideo BL was not replaced with NOP"
      });

      const patchedStateTarget = branchTarget(simulated, stateAddress, false);
      const patchedStateOk = patchedStateTarget === caveAddress;
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "post-show state write branches to lifecycle cave",
        status: patchedStateOk ? "PASS" : "FAIL",
        klass: patchedStateOk ? "ok" : "fail",
        count: patchedStateOk ? 1 : 0,
        detail: patchedStateOk
          ? "target=" + toHex(rvaForOffset(patchedStateTarget, ranges))
          : "post-show state write branch does not target the lifecycle cave"
      });

      const caveCbzTarget = cbzTarget(simulated, caveAddress + cavePatch.offsets.cbz, 8);
      const caveReturnTarget = branchTarget(simulated, caveAddress + cavePatch.offsets.returnBranch, false);
      const caveTimingOk =
        bytesEqual(simulated, caveAddress + cavePatch.offsets.stateWrite, hexToBytes(AD_BYPASS.stateOriginalBytes)) &&
        caveCbzTarget === caveAddress + cavePatch.offsets.returnBranch &&
        bytesEqual(simulated, caveAddress + cavePatch.offsets.frameSetup, hexToBytes(AD_BYPASS.frameSetup)) &&
        bytesEqual(simulated, caveAddress + cavePatch.offsets.restoreFrame, hexToBytes(AD_BYPASS.caveRestoreFrame)) &&
        caveReturnTarget === stateAddress + 4;
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "lifecycle cave preserves post-show state timing",
        status: caveTimingOk ? "PASS" : "FAIL",
        klass: caveTimingOk ? "ok" : "fail",
        count: caveTimingOk ? 1 : 0,
        detail: caveTimingOk
          ? "state write runs before callbacks; return=" + toHex(rvaForOffset(caveReturnTarget, ranges))
          : "state write, cbz, frame setup/restore, or return branch does not match expected timing"
      });

      const openedTarget = branchTarget(simulated, caveAddress + cavePatch.offsets.openedBranch, true);
      const rewardTarget = branchTarget(simulated, caveAddress + cavePatch.offsets.rewardBranch, true);
      const closedTarget = branchTarget(simulated, caveAddress + cavePatch.offsets.closedBranch, true);
      const availabilityTarget = branchTarget(simulated, caveAddress + cavePatch.offsets.availabilityBranch, true);
      const openedOk = openedTarget === bridgeTargets.opened;
      const rewardOk =
        rewardTarget === bridgeTargets.rewarded &&
        bytesEqual(simulated, caveAddress + cavePatch.offsets.nullPlacement, hexToBytes(AD_BYPASS.nullPlacementArg));
      const closedOk = closedTarget === bridgeTargets.closed;
      const availabilityOk =
        availabilityTarget === bridgeTargets.availability &&
        bytesEqual(simulated, caveAddress + cavePatch.offsets.availableTrue, hexToBytes(AD_BYPASS.availableTrueArg));
      const lifecycleOk = openedOk && rewardOk && closedOk && availabilityOk;
      rows.push({
        feature: "Ad Bypass control-flow",
        check: "lifecycle cave calls opened -> rewarded(NULL) -> closed -> available(true)",
        status: lifecycleOk ? "PASS" : "FAIL",
        klass: lifecycleOk ? "ok" : "fail",
        count: lifecycleOk ? 1 : 0,
        detail: lifecycleOk
          ? "opened=" + toHex(rvaForOffset(openedTarget, ranges)) + ", rewarded=" + toHex(rvaForOffset(rewardTarget, ranges)) + ", closed=" + toHex(rvaForOffset(closedTarget, ranges)) + ", availability=" + toHex(rvaForOffset(availabilityTarget, ranges))
          : "generated cave branch targets, null Placement setup, or available=true setup do not match expected rewarded-video bridges"
      });

      return rows;
    }

    function buildCavePatch(data, branchAddress, caveAddress) {
      const template = hexToBytes(TEAM_GOD.caveTemplate);
      const hpTarget = branchTarget(data, branchAddress + 0x1C, true);
      if (hpTarget === null) return null;

      const hpCall = dwordToBytes(encodeBranch(0x94000000, caveAddress + template.length, hpTarget));
      const ret = dwordToBytes(encodeBranch(0x14000000, caveAddress + template.length + 4, branchAddress + 0x20));
      const padding = new Uint8Array(80 - template.length - hpCall.length - ret.length);
      return concatBytes(template, hpCall, ret, padding);
    }

    function verifyTeamGod(data, ranges) {
      const branchOriginal = hexToBytes(TEAM_GOD.branchOriginal);
      const branchAfter = hexToBytes(TEAM_GOD.branchAfter);
      const cavePrefix = hexToBytes(TEAM_GOD.cavePrefix);
      const caveSuffix = hexToBytes(TEAM_GOD.caveSuffix);
      const hpTargetPrefix = hexToBytes(TEAM_GOD.hpTargetPrefix);
      const rows = [];
      const emptyCave = new Uint8Array(80);

      const branchHits = findAll(data, branchAfter, ranges).map(hit => hit - 4);
      rows.push(makeRow("Team God Mode", "branch anchor", branchHits, ranges));

      const caveHits = [];
      for (const suffixHit of findAll(data, caveSuffix, ranges)) {
        const caveAddress = suffixHit - 80;
        if (bytesEqual(data, caveAddress - cavePrefix.length, cavePrefix)) {
          caveHits.push(caveAddress);
        }
      }
      rows.push(makeRow("Team God Mode", "code-cave anchor", caveHits, ranges));

      if (branchHits.length === 1 && caveHits.length === 1) {
        const branchAddress = branchHits[0];
        const caveAddress = caveHits[0];
        const originalStateHits = bytesEqual(data, branchAddress, branchOriginal) && bytesEqual(data, caveAddress, emptyCave)
          ? [branchAddress]
          : [];
        rows.push(makeRow("Team God Mode", "initial OFF state bytes", originalStateHits, ranges, "branch original + cave empty"));

        const cavePatch = buildCavePatch(data, branchAddress, caveAddress);
        const hpTarget = branchTarget(data, branchAddress + 0x1C, true);
        rows.push({
          feature: "Team God Mode",
          check: "original HP setter BL decode",
          status: cavePatch ? "PASS" : "NOT FOUND",
          klass: cavePatch ? "ok" : "fail",
          count: cavePatch ? 1 : 0,
          detail: cavePatch ? "cave branch/call bytes can be generated" : "branch+0x1C is not a BL"
        });

        if (cavePatch) {
          const hpTargetOk = bytesEqual(data, hpTarget, hpTargetPrefix);
          rows.push({
            feature: "Team God Mode",
            check: "HP setter target fingerprint",
            status: hpTargetOk ? "PASS" : "FAIL",
            klass: hpTargetOk ? "ok" : "fail",
            count: hpTargetOk ? 1 : 0,
            detail: hpTargetOk
              ? "target=" + toHex(rvaForOffset(hpTarget, ranges))
              : "decoded BL target does not match expected HP setter prologue"
          });

          const templateLength = hexToBytes(TEAM_GOD.caveTemplate).length;
          const caveHpTargetRelative = branchTarget(cavePatch, templateLength, true);
          const caveReturnTargetRelative = branchTarget(cavePatch, templateLength + 4, false);
          const caveHpTarget = caveHpTargetRelative === null ? null : caveAddress + caveHpTargetRelative;
          const caveReturnTarget = caveReturnTargetRelative === null ? null : caveAddress + caveReturnTargetRelative;
          const caveTargetsOk = caveHpTarget === hpTarget && caveReturnTarget === branchAddress + 0x20;
          rows.push({
            feature: "Team God Mode",
            check: "generated cave branch targets",
            status: caveTargetsOk ? "PASS" : "FAIL",
            klass: caveTargetsOk ? "ok" : "fail",
            count: caveTargetsOk ? 1 : 0,
            detail: caveTargetsOk
              ? "BL target=" + toHex(rvaForOffset(hpTarget, ranges)) + ", return=" + toHex(rvaForOffset(branchAddress + 0x20, ranges))
              : "generated cave branch target mismatch"
          });

          const simulated = data.slice();
          const branchPatch = dwordToBytes(encodeBranch(0x14000000, branchAddress, caveAddress));
          writeBytes(simulated, caveAddress, cavePatch);
          writeBytes(simulated, branchAddress, branchPatch);

          const offBranchOk = bytesEqual(simulated, branchAddress, branchPatch);
          const offCaveOk = bytesEqual(simulated, caveAddress, cavePatch);
          rows.push({
            feature: "Team God Mode",
            check: "ON state after simulation",
            status: offBranchOk && offCaveOk ? "PASS" : "FAIL",
            klass: offBranchOk && offCaveOk ? "ok" : "fail",
            count: offBranchOk && offCaveOk ? 1 : 0,
            detail: "branch=" + toHex(rvaForOffset(branchAddress, ranges)) + ", cave=" + toHex(rvaForOffset(caveAddress, ranges))
          });
        }
      }

      return rows;
    }

    async function extractLibs(file) {
      const root = await JSZip.loadAsync(await file.arrayBuffer());
      const libs = [];

      async function collectFromZip(zip, label) {
        const direct = zip.file("lib/arm64-v8a/libapp.so");
        if (direct) {
          libs.push({ label: label + " :: lib/arm64-v8a/libapp.so", data: new Uint8Array(await direct.async("arraybuffer")) });
        }
      }

      await collectFromZip(root, file.name);

      const nestedApks = Object.values(root.files).filter(entry => !entry.dir && entry.name.toLowerCase().endsWith(".apk"));
      for (const entry of nestedApks) {
        const apkZip = await JSZip.loadAsync(await entry.async("arraybuffer"));
        await collectFromZip(apkZip, file.name + " :: " + entry.name);
      }

      return libs;
    }

    function verifyLib(lib) {
      const ranges = parseExecutableRanges(lib.data);
      const rows = [];
      rows.push(verifyItem(lib.data, ranges));
      for (const patchDef of PATCHES) {
        rows.push(...verifyPatch(lib.data, ranges, patchDef));
      }
      rows.push(...verifyAdBypassControlFlow(lib.data, ranges));
      rows.push(...verifyTeamGod(lib.data, ranges));
      rows.push({
        feature: "Speedy",
        check: "raw float search",
        status: "SKIPPED",
        klass: "warn",
        count: 0,
        detail: "Skipped by design; current Lua uses original raw float search."
      });
      return rows;
    }

    function render(libs) {
      resultsEl.innerHTML = "";
      let pass = 0;
      let fail = 0;
      let warn = 0;

      for (const lib of libs) {
        const rows = verifyLib(lib);
        for (const row of rows) {
          if (row.klass === "ok") pass++;
          else if (row.klass === "warn") warn++;
          else fail++;
        }

        const section = document.createElement("section");
        const h2 = document.createElement("h2");
        h2.textContent = lib.label + " (" + (lib.data.length / 1024 / 1024).toFixed(1) + " MB)";
        section.appendChild(h2);

        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>Result</th><th>Feature</th><th>Check</th><th>Count</th><th>Detail</th></tr></thead>";
        const tbody = document.createElement("tbody");
        for (const row of rows) {
          const tr = document.createElement("tr");
          tr.innerHTML =
            `<td class="result ${row.klass}">${row.status}</td>` +
            `<td>${row.feature}</td>` +
            `<td>${row.check}</td>` +
            `<td>${row.count}</td>` +
            `<td class="detail">${row.detail || ""}</td>`;
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        section.appendChild(table);
        resultsEl.appendChild(section);
      }

      summaryEl.classList.remove("hidden");
      summaryEl.innerHTML =
        `<span class="pill ok">PASS ${pass}</span>` +
        `<span class="pill fail">FAIL ${fail}</span>` +
        `<span class="pill warn">SKIPPED/WARN ${warn}</span>`;
      setStatus(fail === 0 ? "Verification complete: no failed non-speed checks." : "Verification complete: review failed checks.", fail === 0 ? "ok" : "fail");
    }

    async function handleFile(file) {
      resultsEl.innerHTML = "";
      summaryEl.classList.add("hidden");
      setStatus("Reading " + file.name + "...", "info");

      try {
        const libs = await extractLibs(file);
        if (!libs.length) {
          setStatus("No lib/arm64-v8a/libapp.so found in " + file.name + ".", "fail");
          return;
        }
        setStatus("Verifying " + libs.length + " libapp.so file(s)...", "info");
        await new Promise(resolve => setTimeout(resolve, 30));
        render(libs);
      } catch (error) {
        console.error(error);
        setStatus("Failed: " + error.message, "fail");
      }
    }
  </script>
</body>
