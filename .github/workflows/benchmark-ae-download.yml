name: Benchmark Another Eden APKPure Download

run-name: AE transfer benchmark ${{ inputs.packageName }} code ${{ inputs.versionCode }}

on:
  workflow_dispatch:
    inputs:
      packageName:
        required: true
      architecture:
        required: true
      versionCode:
        required: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Stress transfer strategies
        env:
          PACKAGE_NAME: ${{ inputs.packageName }}
          ARCHITECTURE: ${{ inputs.architecture }}
          VERSION_CODE: ${{ inputs.versionCode }}
        run: |
          set -Eeuo pipefail
          [[ "$PACKAGE_NAME" =~ ^(games\.wfs|net\.wrightflyer)\.anothereden$ ]]
          [[ "$ARCHITECTURE" == 'arm64-v8a' ]]
          [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]

          WORK="$RUNNER_TEMP/ae-download-benchmark"
          mkdir -p "$WORK"
          RESULTS="$WORK/results.tsv"
          URL="https://d.apkpure.net/b/XAPK/${PACKAGE_NAME}?versionCode=${VERSION_CODE}&nc=${ARCHITECTURE}"
          printf 'round\tmethod\telapsed_ms\tbytes\tsha256\n' > "$RESULTS"

          record() {
            local round="$1" method="$2" target="$3" start_ns="$4"
            local end_ns elapsed bytes digest
            end_ns=$(date +%s%N)
            elapsed=$(( (end_ns - start_ns) / 1000000 ))
            bytes=$(stat -c %s "$target")
            digest=$(sha256sum "$target" | awk '{print $1}')
            [ "$bytes" -ge 52428800 ]
            [ "$(head -c 4 "$target" | od -An -tx1 | tr -d ' \n')" = '504b0304' ]
            unzip -tq "$target" >/dev/null
            printf '%s\t%s\t%s\t%s\t%s\n' \
              "$round" "$method" "$elapsed" "$bytes" "$digest" | tee -a "$RESULTS"
            rm -f "$target" "$target.aria2"
          }

          aria_download() {
            local round="$1" method="$2" connections="$3" allocation="$4" min_split="$5" disk_cache="$6"
            local target="$WORK/${round}-${method}.xapk" start_ns
            local -a allocation_args=() cache_args=()
            [ "$allocation" = default ] || allocation_args+=("--file-allocation=$allocation")
            [ "$disk_cache" = default ] || cache_args+=("--disk-cache=$disk_cache")
            start_ns=$(date +%s%N)
            aria2c \
              --console-log-level=warn \
              --summary-interval=0 \
              --max-connection-per-server="$connections" \
              --split="$connections" \
              --min-split-size="$min_split" \
              "${allocation_args[@]}" \
              "${cache_args[@]}" \
              --max-tries=3 \
              --retry-wait=3 \
              --connect-timeout=30 \
              --timeout=120 \
              --allow-overwrite=true \
              --auto-file-renaming=false \
              --user-agent='Mozilla/5.0 AE Patch Builder' \
              --dir="$WORK" \
              --out="$(basename "$target")" \
              "$URL"
            record "$round" "$method" "$target" "$start_ns"
          }

          curl_download() {
            local round="$1" target start_ns
            target="$WORK/${round}-curl.xapk"
            start_ns=$(date +%s%N)
            curl -L --fail --silent --show-error \
              --retry 3 --retry-all-errors --retry-delay 3 \
              --connect-timeout 30 --max-time 600 \
              -A 'Mozilla/5.0 AE Patch Builder' \
              -o "$target" "$URL"
            record "$round" curl "$target" "$start_ns"
          }

          wget_download() {
            local round="$1" target start_ns
            target="$WORK/${round}-wget.xapk"
            start_ns=$(date +%s%N)
            wget --quiet \
              --tries=3 --timeout=120 \
              --user-agent='Mozilla/5.0 AE Patch Builder' \
              -O "$target" "$URL"
            record "$round" wget "$target" "$start_ns"
          }

          # Round two reverses the order to reduce CDN/runner timing bias.
          aria_download 1 aria16-current 16 default 2M default
          aria_download 1 aria16-none 16 none 2M default
          aria_download 1 aria16-trunc 16 trunc 2M default
          aria_download 1 aria16-falloc 16 falloc 2M default
          aria_download 1 aria16-none-4m 16 none 4M default
          aria_download 1 aria16-none-cache64 16 none 2M 64M
          aria_download 1 aria8-none 8 none 2M default
          curl_download 1
          wget_download 1

          wget_download 2
          curl_download 2
          aria_download 2 aria8-none 8 none 2M default
          aria_download 2 aria16-none-cache64 16 none 2M 64M
          aria_download 2 aria16-none-4m 16 none 4M default
          aria_download 2 aria16-falloc 16 falloc 2M default
          aria_download 2 aria16-trunc 16 trunc 2M default
          aria_download 2 aria16-none 16 none 2M default
          aria_download 2 aria16-current 16 default 2M default

          [ "$(tail -n +2 "$RESULTS" | cut -f4 | sort -u | wc -l)" -eq 1 ]
          [ "$(tail -n +2 "$RESULTS" | cut -f5 | sort -u | wc -l)" -eq 1 ]
          {
            echo "### $PACKAGE_NAME APKPure transfer benchmark"
            echo
            echo '```text'
            column -t -s $'\t' "$RESULTS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
