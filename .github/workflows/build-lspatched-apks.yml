name: Build LSPatched APKS

run-name: AE LSPatch ${{ inputs.region }} ${{ inputs.variant }} ${{ inputs.nonce }}

on:
  workflow_dispatch:
    inputs:
      region:
        description: Game region
        required: true
        type: choice
        options:
          - global
          - japan
      variant:
        description: Embedded module APK
        required: true
        type: choice
        options:
          - release
          - debug
      nonce:
        description: Request nonce from Vercel
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build APKS
        env:
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
        run: |
          set -euo pipefail

          case "$REGION" in
            japan)
              PACKAGE_NAME="net.wrightflyer.anothereden"
              DEFAULT_NAME="AnotherEden_Japan"
              DOWNLOAD_URL="https://d.apkpure.net/b/XAPK/net.wrightflyer.anothereden?version=latest"
              ;;
            global|*)
              PACKAGE_NAME="games.wfs.anothereden"
              DEFAULT_NAME="AnotherEden_Global"
              DOWNLOAD_URL="https://d.apkpure.net/b/XAPK/games.wfs.anothereden?version=latest"
              ;;
          esac

          MODULE_APK="builder/modules/com.jordan.aepcdtrace-${VARIANT}.apk"
          KEYSTORE="builder/signing/Ashfur.jks"
          test -f "$MODULE_APK"
          test -f "$KEYSTORE"

          WORK="$RUNNER_TEMP/ae-lspatch"
          mkdir -p "$WORK"/{tools,xapk,lspatch-out,signed-base,resign-in,signed-splits,bundle}

          curl -L --fail --retry 3 -A "Mozilla/5.0 AE Patch Builder" -o "$WORK/source.xapk" "$DOWNLOAD_URL"
          unzip -q -o "$WORK/source.xapk" -d "$WORK/xapk"

          BASE_APK="$(find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -name "config.*.apk" ! -name "AssetPack*.apk" | head -n 1)"
          if [ -z "$BASE_APK" ]; then
            echo "No base APK found in XAPK" >&2
            exit 1
          fi

          curl -L --fail -o "$WORK/tools/lspatch.jar" \
            "https://github.com/JingMatrix/LSPatch/releases/download/v0.8/lspatch.jar"
          curl -L --fail -o "$WORK/tools/uber-apk-signer.jar" \
            "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"

          java -jar "$WORK/tools/lspatch.jar" \
            -m "$MODULE_APK" \
            -k "$KEYSTORE" "[removed-private-value]" "Ashfur" "[removed-private-value]" \
            -l 2 \
            -f \
            -o "$WORK/lspatch-out" \
            "$BASE_APK"

          LSPATCHED_BASE="$(find "$WORK/lspatch-out" -maxdepth 1 -type f -name "*-lspatched.apk" | head -n 1)"
          java -jar "$WORK/tools/uber-apk-signer.jar" \
            -a "$LSPATCHED_BASE" \
            --ks "$KEYSTORE" \
            --ksAlias "Ashfur" \
            --ksPass "[removed-private-value]" \
            --ksKeyPass "[removed-private-value]" \
            --allowResign \
            --out "$WORK/signed-base"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              cp "$split" "$WORK/resign-in/$(basename "$split")"
            done

          if find "$WORK/resign-in" -maxdepth 1 -type f -name "*.apk" | grep -q .; then
            java -jar "$WORK/tools/uber-apk-signer.jar" \
              -a "$WORK/resign-in" \
              --ks "$KEYSTORE" \
              --ksAlias "Ashfur" \
              --ksPass "[removed-private-value]" \
              --ksKeyPass "[removed-private-value]" \
              --allowResign \
              --out "$WORK/signed-splits"
          fi

          BASE_SIGNED="$(find "$WORK/signed-base" -maxdepth 1 -type f -name "*-aligned-signed.apk" | head -n 1)"
          cp "$BASE_SIGNED" "$WORK/bundle/$(basename "$BASE_APK")"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              signed="$WORK/signed-splits/$(basename "$split" .apk)-aligned-signed.apk"
              test -f "$signed"
              cp "$signed" "$WORK/bundle/$(basename "$split")"
            done

          if [ -f "$WORK/xapk/manifest.json" ]; then
            cp "$WORK/xapk/manifest.json" "$WORK/bundle/manifest.json"
          fi

          OUT="$PWD/${DEFAULT_NAME}_LSPatched_Ashfur_${VARIANT}_${NONCE}.apks"
          (cd "$WORK/bundle" && zip -q -r -0 -Z store "$OUT" ./*.apk ./manifest.json)
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Publish short-lived release
        env:
          GH_TOKEN: ${{ github.token }}
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
        run: |
          set -euo pipefail
          TAG="lspatch-${NONCE}"
          gh release create "$TAG" "$OUT#$(basename "$OUT")" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LSPatched APKS ${REGION} ${VARIANT} ${NONCE}" \
            --notes "Temporary personal LSPatch build for ${PACKAGE_NAME}. Safe to delete after download."
