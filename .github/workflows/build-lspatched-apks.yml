name: Build LSPatched APKS

run-name: AE LSPatch ${{ inputs.region }} ${{ inputs.variant }} ${{ inputs.nonce }}

on:
  workflow_dispatch:
    inputs:
      region:
        description: Game region
        required: true
        type: choice
        options:
          - global
          - japan
      variant:
        description: Embedded module APK
        required: true
        type: choice
        options:
          - release
          - debug
      moduleSha:
        description: Server-resolved module commit to embed
        required: true
      nonce:
        description: Request nonce from Vercel
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;25.2.9519653"

      - name: Prepare module source
        env:
          MODULE_SHA: ${{ inputs.moduleSha }}
          MODULE_REPO: ${{ secrets.AE_MODULE_REPO }}
          GH_TOKEN: ${{ secrets.AE_MODULE_REPO_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$MODULE_REPO"
          test -n "$GH_TOKEN"

          WORK="$RUNNER_TEMP/ae-lspatch"
          mkdir -p "$WORK"/{tools,xapk,lspatch-out,signed-base,resign-in,signed-splits,bundle}

          gh repo clone "$MODULE_REPO" "$WORK/module"
          git -C "$WORK/module" checkout --detach "$MODULE_SHA"
          MODULE_SHA_SHORT="$(git -C "$WORK/module" rev-parse --short=7 HEAD)"
          chmod +x "$WORK/module/gradlew"

          CACHE_KEY="$(find "$WORK/module" -maxdepth 3 -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "gradle-wrapper.properties" -o -name "libs.versions.toml" \) -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d ' ' -f 1)"
          echo "CACHE_KEY=$CACHE_KEY" >> "$GITHUB_ENV"
          echo "WORK=$WORK" >> "$GITHUB_ENV"
          echo "MODULE_SHA_SHORT=$MODULE_SHA_SHORT" >> "$GITHUB_ENV"

      - name: Cache module Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.WORK }}/module/app/.cxx
          key: ae-module-gradle-${{ runner.os }}-${{ inputs.variant }}-${{ env.CACHE_KEY }}
          restore-keys: |
            ae-module-gradle-${{ runner.os }}-${{ inputs.variant }}-
            ae-module-gradle-${{ runner.os }}-

      - name: Build APKS
        env:
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
        run: |
          set -euo pipefail

          case "$REGION" in
            japan)
              PACKAGE_NAME="net.wrightflyer.anothereden"
              DEFAULT_NAME="AnotherEden_Japan"
              DOWNLOAD_URL="https://d.apkpure.net/b/XAPK/net.wrightflyer.anothereden?version=latest"
              ;;
            global|*)
              PACKAGE_NAME="games.wfs.anothereden"
              DEFAULT_NAME="AnotherEden_Global"
              DOWNLOAD_URL="https://d.apkpure.net/b/XAPK/games.wfs.anothereden?version=latest"
              ;;
          esac

          KEYSTORE="builder/signing/Ashfur.jks"
          test -f "$KEYSTORE"
          test -n "$WORK"
          MODULE_SHA_SHORT="$(git -C "$WORK/module" rev-parse --short=7 HEAD)"
          case "$VARIANT" in
            debug)
              (cd "$WORK/module" && ./gradlew :app:assembleDebug --stacktrace)
              MODULE_APK="$WORK/module/app/build/outputs/apk/debug/app-debug.apk"
              ;;
            release|*)
              (cd "$WORK/module" && ./gradlew :app:assembleRelease --stacktrace)
              MODULE_APK="$WORK/module/app/build/outputs/apk/release/app-release.apk"
              ;;
          esac
          test -f "$MODULE_APK"
          echo "Using module APK: $MODULE_APK"
          echo "Using module commit: $MODULE_SHA_SHORT"
          unzip -p "$MODULE_APK" META-INF/version-control-info.textproto || true
          sha256sum "$MODULE_APK"

          curl -L --fail --retry 3 -A "Mozilla/5.0 AE Patch Builder" -o "$WORK/source.xapk" "$DOWNLOAD_URL"
          unzip -q -o "$WORK/source.xapk" -d "$WORK/xapk"

          BASE_APK="$(find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -name "config.*.apk" ! -name "AssetPack*.apk" | head -n 1)"
          if [ -z "$BASE_APK" ]; then
            echo "No base APK found in XAPK" >&2
            exit 1
          fi

          curl -L --fail -o "$WORK/tools/lspatch.jar" \
            "https://github.com/JingMatrix/LSPatch/releases/download/v0.8/lspatch.jar"
          curl -L --fail -o "$WORK/tools/uber-apk-signer.jar" \
            "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"

          java -jar "$WORK/tools/lspatch.jar" \
            -m "$MODULE_APK" \
            -k "$KEYSTORE" "[removed-private-value]" "Ashfur" "[removed-private-value]" \
            -l 2 \
            -f \
            -o "$WORK/lspatch-out" \
            "$BASE_APK"

          LSPATCHED_BASE="$(find "$WORK/lspatch-out" -maxdepth 1 -type f -name "*-lspatched.apk" | head -n 1)"
          java -jar "$WORK/tools/uber-apk-signer.jar" \
            -a "$LSPATCHED_BASE" \
            --ks "$KEYSTORE" \
            --ksAlias "Ashfur" \
            --ksPass "[removed-private-value]" \
            --ksKeyPass "[removed-private-value]" \
            --allowResign \
            --out "$WORK/signed-base"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              cp "$split" "$WORK/resign-in/$(basename "$split")"
            done

          if find "$WORK/resign-in" -maxdepth 1 -type f -name "*.apk" | grep -q .; then
            java -jar "$WORK/tools/uber-apk-signer.jar" \
              -a "$WORK/resign-in" \
              --ks "$KEYSTORE" \
              --ksAlias "Ashfur" \
              --ksPass "[removed-private-value]" \
              --ksKeyPass "[removed-private-value]" \
              --allowResign \
              --out "$WORK/signed-splits"
          fi

          BASE_SIGNED="$(find "$WORK/signed-base" -maxdepth 1 -type f -name "*-aligned-signed.apk" | head -n 1)"
          cp "$BASE_SIGNED" "$WORK/bundle/$(basename "$BASE_APK")"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              signed="$WORK/signed-splits/$(basename "$split" .apk)-aligned-signed.apk"
              test -f "$signed"
              cp "$signed" "$WORK/bundle/$(basename "$split")"
            done

          if [ -f "$WORK/xapk/manifest.json" ]; then
            cp "$WORK/xapk/manifest.json" "$WORK/bundle/manifest.json"
          fi

          OUT="$PWD/${DEFAULT_NAME}_LSPatched_Ashfur_${VARIANT}_${MODULE_SHA_SHORT}_${NONCE}.apks"
          (cd "$WORK/bundle" && zip -q -r -0 -Z store "$OUT" ./*.apk ./manifest.json)
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "MODULE_SHA_SHORT=$MODULE_SHA_SHORT" >> "$GITHUB_ENV"

      - name: Publish short-lived release
        env:
          GH_TOKEN: ${{ github.token }}
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
        run: |
          set -euo pipefail
          TAG="lspatch-${NONCE}"
          gh release create "$TAG" "$OUT#$(basename "$OUT")" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LSPatched APKS ${REGION} ${VARIANT} ${NONCE}" \
            --notes "Temporary personal LSPatch build for ${PACKAGE_NAME}. Module commit: ${MODULE_SHA_SHORT}. Safe to delete after download."
