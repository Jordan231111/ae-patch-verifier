name: Build LSPatched APKS

run-name: AE LSPatch ${{ inputs.region }} ${{ inputs.variant }} ${{ inputs.nonce }}

on:
  workflow_dispatch:
    inputs:
      region:
        description: Game region
        required: true
        type: choice
        options:
          - global
          - japan
      variant:
        description: Embedded module APK
        required: true
        type: choice
        options:
          - release
          - debug
      moduleSha:
        description: Server-resolved module commit to embed
        required: true
      moduleRef:
        description: Branch the module commit was resolved from
        required: false
        default: main
      nonce:
        description: Request nonce from Vercel
        required: true

permissions:
  contents: write

env:
  LSPATCH_VERSION: "v0.8"
  LSPATCH_JAR_URL: "https://github.com/JingMatrix/LSPatch/releases/download/v0.8/lspatch.jar"
  UBER_SIGNER_VERSION: "1.3.0"
  UBER_SIGNER_JAR_URL: "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Resolve the module APK BEFORE any Android tooling. If the module repo already published a
      # prebuilt APK for this commit (a durable module-<sha> release from its android.yml), download
      # it (~2s) and skip the entire Android SDK + NDK + Gradle compile (~80s). If it's not there yet
      # (e.g. the module was just pushed and its CI hasn't finished), fall back to compiling — so a
      # build can never break, it just takes the old ~2-3 min that one time.
      - name: Resolve module APK (prebuilt, else compile)
        id: modapk
        env:
          MODULE_SHA: ${{ inputs.moduleSha }}
          MODULE_REPO: ${{ secrets.AE_MODULE_REPO }}
          GH_TOKEN: ${{ secrets.AE_MODULE_REPO_TOKEN }}
          VARIANT: ${{ inputs.variant }}
        run: |
          set -euo pipefail
          test -n "$MODULE_REPO"
          test -n "$GH_TOKEN"
          test -n "$MODULE_SHA"
          WORK="$RUNNER_TEMP/ae-lspatch"
          mkdir -p "$WORK"/{lspatch-out,signed-base,resign-in,signed-splits,bundle,xapk,prebuilt,module}
          echo "WORK=$WORK" >> "$GITHUB_ENV"
          echo "MODULE_SHA_SHORT=${MODULE_SHA:0:7}" >> "$GITHUB_ENV"
          ASSET="app-${VARIANT}.apk"
          if gh release download "module-${MODULE_SHA}" --repo "$MODULE_REPO" --pattern "$ASSET" --dir "$WORK/prebuilt" 2>/dev/null \
             && [ -s "$WORK/prebuilt/$ASSET" ]; then
            echo "MODULE_APK=$WORK/prebuilt/$ASSET" >> "$GITHUB_ENV"
            echo "prebuilt=true" >> "$GITHUB_OUTPUT"
            echo "[module] prebuilt $ASSET found for ${MODULE_SHA:0:7} -> skipping Android compile"
          else
            echo "prebuilt=false" >> "$GITHUB_OUTPUT"
            echo "[module] no prebuilt for ${MODULE_SHA:0:7} -> compiling from source"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        if: steps.modapk.outputs.prebuilt != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 cmake;3.22.1 ndk;25.2.9519653"

      - name: Cache LSPatch and signer jars
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: tools-cache
          key: lspatch-${{ env.LSPATCH_VERSION }}-signer-${{ env.UBER_SIGNER_VERSION }}

      - name: Download LSPatch and signer jars (cache miss)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p tools-cache
          curl -L --fail -o tools-cache/lspatch.jar "$LSPATCH_JAR_URL"
          curl -L --fail -o tools-cache/uber-apk-signer.jar "$UBER_SIGNER_JAR_URL"

      - name: Prepare module source (shallow)
        if: steps.modapk.outputs.prebuilt != 'true'
        env:
          MODULE_SHA: ${{ inputs.moduleSha }}
          MODULE_REF: ${{ inputs.moduleRef }}
          MODULE_REPO: ${{ secrets.AE_MODULE_REPO }}
          GH_TOKEN: ${{ secrets.AE_MODULE_REPO_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$MODULE_REPO"
          test -n "$GH_TOKEN"
          test -n "$MODULE_SHA"

          WORK="$RUNNER_TEMP/ae-lspatch"
          mkdir -p "$WORK"/{lspatch-out,signed-base,resign-in,signed-splits,bundle,xapk}

          git init -q "$WORK/module"
          git -C "$WORK/module" config core.fsmonitor false
          git -C "$WORK/module" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${MODULE_REPO}.git"
          # Fetch exactly the pinned commit at depth 1. GitHub lets us fetch any
          # commit reachable from an advertised ref, so this works no matter which
          # branch the commit lives on (main, houdini-x64-rewrite, ...) and pulls a
          # single commit -- maximally cheap. If the direct SHA fetch is ever
          # refused, shallow-fetch the source branch instead. Either path stays
          # shallow; we never --unshallow (which would download the full history).
          if ! git -C "$WORK/module" fetch --depth 1 origin "$MODULE_SHA"; then
            git -C "$WORK/module" fetch --depth 50 origin "${MODULE_REF:-HEAD}"
          fi
          git -C "$WORK/module" checkout --detach "$MODULE_SHA"

          MODULE_SHA_SHORT="$(git -C "$WORK/module" rev-parse --short=7 HEAD)"
          chmod +x "$WORK/module/gradlew"

          CACHE_KEY="$(find "$WORK/module" -maxdepth 3 -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "gradle-wrapper.properties" -o -name "libs.versions.toml" \) -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d ' ' -f 1)"
          echo "CACHE_KEY=$CACHE_KEY" >> "$GITHUB_ENV"
          echo "WORK=$WORK" >> "$GITHUB_ENV"
          echo "MODULE_SHA_SHORT=$MODULE_SHA_SHORT" >> "$GITHUB_ENV"

      - name: Cache module Gradle files
        if: steps.modapk.outputs.prebuilt != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.WORK }}/module/app/.cxx
            ${{ env.WORK }}/module/.gradle
            ${{ env.WORK }}/module/app/build/intermediates/cxx
          key: ae-module-gradle-${{ runner.os }}-${{ inputs.variant }}-${{ env.CACHE_KEY }}
          restore-keys: |
            ae-module-gradle-${{ runner.os }}-${{ inputs.variant }}-
            ae-module-gradle-${{ runner.os }}-

      - name: Build APKS
        env:
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
          # AE intentionally uses the established Ashfur identity. OnceWorld uses LSPatch's
          # default host identity in its own workflow; never substitute one key for the other.
          AE_HOST_KEYSTORE_BASE64: ${{ secrets.AE_HOST_KEYSTORE_BASE64 }}
          AE_HOST_KEYSTORE_PASSWORD: ${{ secrets.AE_HOST_KEYSTORE_PASSWORD }}
          AE_HOST_KEY_ALIAS: ${{ secrets.AE_HOST_KEY_ALIAS }}
          AE_HOST_CERT_SHA256: ${{ vars.AE_HOST_CERT_SHA256 }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"
        run: |
          set -euo pipefail

          test -n "$AE_HOST_KEYSTORE_BASE64"
          test -n "$AE_HOST_KEYSTORE_PASSWORD"
          test -n "$AE_HOST_KEY_ALIAS"
          test -n "$AE_HOST_CERT_SHA256"
          # Recreate the encrypted repository secret only inside this disposable runner.
          KEYSTORE="$RUNNER_TEMP/ae-host-signing.jks"
          printf '%s' "$AE_HOST_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          test -s "$KEYSTORE"
          ACTUAL_HOST_CERT_SHA256="$(keytool -list -v \
            -keystore "$KEYSTORE" \
            -storepass "$AE_HOST_KEYSTORE_PASSWORD" \
            -alias "$AE_HOST_KEY_ALIAS" 2>/dev/null \
            | awk -F': ' '/SHA256:/{gsub(":", "", $2); print tolower($2); exit}')"
          if [ "$ACTUAL_HOST_CERT_SHA256" != "$AE_HOST_CERT_SHA256" ]; then
            echo "::error::AE host signing certificate does not match the established identity."
            exit 1
          fi

          case "$REGION" in
            japan)
              PACKAGE_NAME="net.wrightflyer.anothereden"
              DEFAULT_NAME="AnotherEden_Japan"
              ;;
            global|*)
              PACKAGE_NAME="games.wfs.anothereden"
              DEFAULT_NAME="AnotherEden_Global"
              ;;
          esac

          # APKPure recently re-enabled the 32-bit armeabi-v7a variant, and `?version=latest` now
          # resolves to that 32-bit build. A 32-bit XAPK won't install on arm64-only emulators
          # (INSTALL_FAILED_NO_MATCHING_ABIS) and makes LSPatch's ShadowHook init fail on real
          # arm64 devices, so we must pin arm64-v8a. APKPure ignores the `nc` arch filter whenever
          # `version=latest` is used, so resolve the latest versionCode first, then pin the ABI.
          # (The `version=latest` 302 points at a CDN file whose LAST path segment, before the `?`,
          # is base64url("<pkg>_<versionCode>_<hash>"). The host/path is NOT stable -- it has moved
          # from d.apkpure.net/b/XAPK/<token> to data.winudf.com/XAPK/<token> -- so we extract the
          # token as "last path segment" with shell expansion, never a fixed-path regex.)
          # No `sv` (device SDK) param on purpose: APKPure rejects an sv below the app's minSdk, so
          # hardcoding it would break if the game raises minSdk; omitting it serves arm64 regardless.
          APKPURE_ABI="arm64-v8a"
          echo "[xapk] resolving latest versionCode for $PACKAGE_NAME ..."
          # Resolve in a short retry loop. This single request previously had no retry, so a
          # transient 5xx/timeout from the redirect endpoint failed the entire build; the actual
          # file download (below) already retries, this just brings the resolve step up to parity.
          VERSION_CODE=""
          LATEST_LOC=""
          XAPK_TOKEN=""
          XAPK_DECODED=""
          rattempt=0
          until [ "$rattempt" -ge 5 ]; do
            rattempt=$((rattempt + 1))
            LATEST_LOC="$(curl -sS -m 30 -A "Mozilla/5.0 AE Patch Builder" -o /dev/null -D - \
              "https://d.apkpure.net/b/XAPK/$PACKAGE_NAME?version=latest" \
              | tr -d '\r' | awk 'tolower($1)=="location:"{print $2; exit}' || true)"
            # Token = last path segment before the query string, via shell expansion (not a fixed
            # path regex) so it survives APKPure moving the file between hosts/paths.
            XAPK_TOKEN="${LATEST_LOC%%\?*}"
            XAPK_TOKEN="${XAPK_TOKEN##*/}"
            XAPK_B64="$(printf '%s' "$XAPK_TOKEN" | sed 'y#-_#+/#')"
            while [ $(( ${#XAPK_B64} % 4 )) -ne 0 ]; do XAPK_B64="${XAPK_B64}="; done
            XAPK_DECODED="$(printf '%s' "$XAPK_B64" | base64 -d 2>/dev/null || true)"
            CANDIDATE="$(printf '%s' "$XAPK_DECODED" | awk -F_ '{print $(NF-1)}')"
            case "$CANDIDATE" in
              ''|*[!0-9]*)
                echo "[xapk] resolve attempt $rattempt did not yield a versionCode (loc='$LATEST_LOC'); retrying in 3s..."
                sleep 3
                ;;
              *)
                VERSION_CODE="$CANDIDATE"
                break
                ;;
            esac
          done
          if [ -z "$VERSION_CODE" ]; then
            echo "::error::Could not resolve latest versionCode from APKPure after $rattempt attempts (token='$XAPK_TOKEN' decoded='$XAPK_DECODED' loc='$LATEST_LOC')"
            exit 1
          fi
          XAPK_URL="https://d.apkpure.net/b/XAPK/$PACKAGE_NAME?versionCode=$VERSION_CODE&nc=$APKPURE_ABI"
          echo "[xapk] latest versionCode=$VERSION_CODE, pinned ABI=$APKPURE_ABI"
          echo "[xapk] url=$XAPK_URL"

          test -n "$WORK"

          # Start the XAPK download in the background of THIS shell so we can
          # genuinely wait for it later. The previous design used a separate step
          # and lost the child PID across the shell boundary.
          #
          # APKPure throttles single connections to ~750 KB/s. aria2c with 16
          # parallel connections + 4 MB splits typically gets 4-8x speedup.
          XAPK_FILE="$WORK/source.xapk"
          XAPK_DIR="$(dirname "$XAPK_FILE")"
          XAPK_NAME="$(basename "$XAPK_FILE")"
          rm -f "$XAPK_FILE" "$XAPK_FILE.aria2"
          (
            set +e
            attempt=0
            until [ "$attempt" -ge 5 ]; do
              attempt=$((attempt + 1))
              echo "[xapk] attempt $attempt -> $XAPK_URL"
              if command -v aria2c >/dev/null 2>&1; then
                if aria2c \
                    --console-log-level=warn \
                    --summary-interval=0 \
                    --max-connection-per-server=16 \
                    --split=16 \
                    --min-split-size=2M \
                    --file-allocation=none \
                    --max-tries=3 \
                    --retry-wait=3 \
                    --connect-timeout=30 \
                    --timeout=120 \
                    --allow-overwrite=true \
                    --auto-file-renaming=false \
                    --user-agent="Mozilla/5.0 AE Patch Builder" \
                    --dir="$XAPK_DIR" \
                    --out="$XAPK_NAME" \
                    "$XAPK_URL"; then
                  echo "[xapk] attempt $attempt succeeded (aria2c)"
                  exit 0
                fi
              else
                if curl -L --fail --silent --show-error \
                     --connect-timeout 30 --max-time 600 \
                     -A "Mozilla/5.0 AE Patch Builder" \
                     -o "$XAPK_FILE" \
                     "$XAPK_URL"; then
                  echo "[xapk] attempt $attempt succeeded (curl)"
                  exit 0
                fi
              fi
              rm -f "$XAPK_FILE" "$XAPK_FILE.aria2"
              echo "[xapk] attempt $attempt failed, retrying after 5s..."
              sleep 5
            done
            echo "[xapk] all attempts failed" >&2
            exit 1
          ) &
          XAPK_PID=$!

          # MODULE_APK is already set (via $GITHUB_ENV) when a prebuilt was downloaded; only
          # compile from source on the fallback path.
          if [ -z "${MODULE_APK:-}" ]; then
            case "$VARIANT" in
              debug)
                (cd "$WORK/module" && ./gradlew :app:assembleDebug -q)
                MODULE_APK="$WORK/module/app/build/outputs/apk/debug/app-debug.apk"
                ;;
              release|*)
                (cd "$WORK/module" && ./gradlew :app:assembleRelease -q)
                MODULE_APK="$WORK/module/app/build/outputs/apk/release/app-release.apk"
                ;;
            esac
          fi
          test -f "$MODULE_APK"
          echo "Using module APK: $MODULE_APK"
          echo "Using module commit: $MODULE_SHA_SHORT"
          sha256sum "$MODULE_APK"

          # Wait for the parallel XAPK download (same shell, so this works).
          echo "Waiting for XAPK download (pid $XAPK_PID)..."
          if ! wait "$XAPK_PID"; then
            echo "::error::APKPure XAPK download failed after 5 attempts."
            exit 1
          fi

          # Validate the file: must exist, be at least 50 MB, and have a ZIP signature.
          test -s "$XAPK_FILE" || { echo "::error::source.xapk is empty"; exit 1; }
          XAPK_SIZE="$(stat -c %s "$XAPK_FILE")"
          echo "XAPK size: $XAPK_SIZE bytes"
          if [ "$XAPK_SIZE" -lt 52428800 ]; then
            echo "::error::source.xapk is only $XAPK_SIZE bytes; APKPure likely returned an error page."
            head -c 512 "$XAPK_FILE" | od -c | head -5 >&2 || true
            exit 1
          fi
          SIGN="$(head -c 4 "$XAPK_FILE" | od -An -tx1 | tr -d ' \n')"
          if [ "$SIGN" != "504b0304" ]; then
            echo "::error::source.xapk does not have a ZIP signature (got $SIGN)."
            exit 1
          fi
          unzip -q -o "$XAPK_FILE" -d "$WORK/xapk"

          BASE_APK="$(find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -name "config.*.apk" ! -name "AssetPack*.apk" | head -n 1)"
          if [ -z "$BASE_APK" ]; then
            echo "No base APK found in XAPK" >&2
            exit 1
          fi

          # Safety net: refuse to ship a 32-bit build. If APKPure ever changes its default ABI
          # again, fail loudly here instead of producing an uninstallable/ShadowHook-failing APKS.
          if [ -z "$(find "$WORK/xapk" -maxdepth 1 -type f -name 'config.arm64_v8a.apk')" ]; then
            echo "::error::Downloaded XAPK has no config.arm64_v8a.apk split (expected arm64-v8a)." >&2
            find "$WORK/xapk" -maxdepth 1 -type f -name '*.apk' -printf '  %f\n' >&2 || true
            exit 1
          fi

          LSPATCH_JAR="$PWD/tools-cache/lspatch.jar"
          SIGNER_JAR="$PWD/tools-cache/uber-apk-signer.jar"
          test -s "$LSPATCH_JAR"
          test -s "$SIGNER_JAR"

          java -jar "$LSPATCH_JAR" \
            -m "$MODULE_APK" \
            -k "$KEYSTORE" "$AE_HOST_KEYSTORE_PASSWORD" "$AE_HOST_KEY_ALIAS" "$AE_HOST_KEYSTORE_PASSWORD" \
            -l 2 \
            -f \
            -o "$WORK/lspatch-out" \
            "$BASE_APK"

          LSPATCHED_BASE="$(find "$WORK/lspatch-out" -maxdepth 1 -type f -name "*-lspatched.apk" | head -n 1)"
          java -jar "$SIGNER_JAR" \
            -a "$LSPATCHED_BASE" \
            --ks "$KEYSTORE" \
            --ksAlias "$AE_HOST_KEY_ALIAS" \
            --ksPass "$AE_HOST_KEYSTORE_PASSWORD" \
            --ksKeyPass "$AE_HOST_KEYSTORE_PASSWORD" \
            --allowResign \
            --out "$WORK/signed-base"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              cp "$split" "$WORK/resign-in/$(basename "$split")"
            done

          if find "$WORK/resign-in" -maxdepth 1 -type f -name "*.apk" | grep -q .; then
            java -jar "$SIGNER_JAR" \
              -a "$WORK/resign-in" \
              --ks "$KEYSTORE" \
              --ksAlias "$AE_HOST_KEY_ALIAS" \
              --ksPass "$AE_HOST_KEYSTORE_PASSWORD" \
              --ksKeyPass "$AE_HOST_KEYSTORE_PASSWORD" \
              --allowResign \
              --out "$WORK/signed-splits"
          fi

          BASE_SIGNED="$(find "$WORK/signed-base" -maxdepth 1 -type f -name "*-aligned-signed.apk" | head -n 1)"
          cp "$BASE_SIGNED" "$WORK/bundle/$(basename "$BASE_APK")"

          find "$WORK/xapk" -maxdepth 1 -type f -name "*.apk" ! -path "$BASE_APK" -print0 |
            while IFS= read -r -d '' split; do
              signed="$WORK/signed-splits/$(basename "$split" .apk)-aligned-signed.apk"
              test -f "$signed"
              cp "$signed" "$WORK/bundle/$(basename "$split")"
            done

          if [ -f "$WORK/xapk/manifest.json" ]; then
            cp "$WORK/xapk/manifest.json" "$WORK/bundle/manifest.json"
          fi

          OUT="$PWD/${DEFAULT_NAME}_LSPatched_Ashfur_${VARIANT}_${MODULE_SHA_SHORT}_${NONCE}.apks"
          (cd "$WORK/bundle" && zip -q -r -0 -Z store "$OUT" ./*.apk ./manifest.json)
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "MODULE_SHA_SHORT=$MODULE_SHA_SHORT" >> "$GITHUB_ENV"

      - name: Publish short-lived release
        env:
          GH_TOKEN: ${{ github.token }}
          REGION: ${{ inputs.region }}
          VARIANT: ${{ inputs.variant }}
          NONCE: ${{ inputs.nonce }}
        run: |
          set -euo pipefail
          TAG="lspatch-${NONCE}"
          gh release create "$TAG" "$OUT#$(basename "$OUT")" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LSPatched APKS ${REGION} ${VARIANT} ${NONCE}" \
            --notes "Temporary personal LSPatch build for ${PACKAGE_NAME}. Module commit: ${MODULE_SHA_SHORT}. The lspatch-janitor workflow purges this within ~30 minutes."
